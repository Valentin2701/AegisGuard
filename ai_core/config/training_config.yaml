# Model
model:
  hidden_dim: 128
  num_layers: 3
  dropout: 0.2

# Training
training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  num_epochs: 50
  patience: 10
  
# Data
data:
  collection_time: 300 
  window_size: 60 
  stride: 10 
  
# Loss
loss:
  use_focal_loss: true
  focal_alpha: 0.25
  focal_gamma: 2.0

# Logging
logging:
  use_wandb: false
  log_interval: 10